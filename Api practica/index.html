<!DOCTYPE html>
<html lang="en">
<head>
<div id="alert" class="alert alert-success d-none"></div>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<link href="bootstrap.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Panel Del CRUD</h1>
    <div class="d-flex justify-content-center gap-2 mb-4">
        <button class="btn btn-primary" onclick="loadData('products')">Productos</button>
        <button class="btn btn-primary" onclick="loadData('users')">Usuarios</button>
        <button class="btn btn-primary" onclick="loadData('posts')">Posts</button>
        <button class="btn btn-primary" onclick="loadData('carts')">Carts</button>
    </div>
    <div class="card p-3 mb-4">
        <h4>Agregar / Actualizar</h4>

        <input id="idUpdate" class="form-control mb-2" placeholder="ID (solo para actualizar)">
        <input id="input1" class="form-control mb-2" placeholder="Campo 1">
        <input id="input2" class="form-control mb-2" placeholder="Campo 2">

        <div class="d-flex gap-2">
            <button class="btn btn-success" onclick="createItem()">Agregar</button>
            <button class="btn btn-warning" onclick="updateItem()">Actualizar</button>
        </div>
    </div>
    <div id="container" class="row"></div>

</div>

<script src="js/app.js"></script>
</body>
</html>
